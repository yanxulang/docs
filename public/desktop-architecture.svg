<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">言序原生图形界面两条路线</title>
  <desc id="desc">现有言窗路线和新的言界加言台路线最终连接 Windows、macOS 与 Linux。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f172a"/><stop offset="1" stop-color="#172554"/></linearGradient>
    <linearGradient id="new" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".28"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="60" y="62" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="30" font-weight="700">言序原生桌面 GUI</text>
  <text x="60" y="94" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="17">两条路线并行维护；应用无需接触平台句柄</text>
  <g filter="url(#shadow)" font-family="system-ui,sans-serif">
    <rect x="60" y="140" width="230" height="78" rx="16" fill="#1e293b" stroke="#64748b"/>
    <text x="175" y="176" fill="#fff" font-size="22" text-anchor="middle" font-weight="650">言序应用</text><text x="175" y="200" fill="#94a3b8" font-size="14" text-anchor="middle">现有路线</text>
    <rect x="365" y="140" width="250" height="78" rx="16" fill="#334155" stroke="#94a3b8"/>
    <text x="490" y="175" fill="#fff" font-size="22" text-anchor="middle" font-weight="650">言窗 yanxu-gui</text><text x="490" y="200" fill="#cbd5e1" font-size="14" text-anchor="middle">egui / eframe / winit</text>
    <line x1="290" y1="179" x2="353" y2="179" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="60" y="280" width="230" height="78" rx="16" fill="url(#new)" stroke="#93c5fd"/>
    <text x="175" y="316" fill="#fff" font-size="22" text-anchor="middle" font-weight="650">言序应用</text><text x="175" y="340" fill="#dbeafe" font-size="14" text-anchor="middle">新路线</text>
    <rect x="365" y="280" width="250" height="78" rx="16" fill="#1d4ed8" stroke="#93c5fd"/>
    <text x="490" y="315" fill="#fff" font-size="22" text-anchor="middle" font-weight="650">言界 yanxu-ui</text><text x="490" y="340" fill="#dbeafe" font-size="14" text-anchor="middle">言序保留模式控件</text>
    <line x1="290" y1="319" x2="353" y2="319" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="690" y="280" width="250" height="78" rx="16" fill="#6d28d9" stroke="#c4b5fd"/>
    <text x="815" y="315" fill="#fff" font-size="22" text-anchor="middle" font-weight="650">言台 yanxu-platform</text><text x="815" y="340" fill="#ede9fe" font-size="14" text-anchor="middle">统一窗口／输入／绘制原语</text>
    <line x1="615" y1="319" x2="678" y2="319" stroke="#c4b5fd" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="1000" y="140" width="150" height="218" rx="18" fill="#0f766e" stroke="#5eead4"/>
    <text x="1075" y="188" fill="#fff" font-size="19" text-anchor="middle" font-weight="650">操作系统</text>
    <line x1="1025" y1="213" x2="1125" y2="213" stroke="#5eead4" opacity=".55"/>
    <text x="1075" y="249" fill="#ccfbf1" font-size="16" text-anchor="middle">Windows</text><text x="1075" y="285" fill="#ccfbf1" font-size="16" text-anchor="middle">macOS</text><text x="1075" y="321" fill="#ccfbf1" font-size="16" text-anchor="middle">Linux</text>
    <line x1="615" y1="179" x2="988" y2="179" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="940" y1="319" x2="988" y2="319" stroke="#5eead4" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
  <rect x="60" y="410" width="1080" height="62" rx="14" fill="#ffffff" opacity=".07"/>
  <text x="600" y="448" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="17" text-anchor="middle">共同基础：言序 1.1.8 · ABI v2 · 原生窗口 · 中文 IME · 六个桌面目标</text>
</svg>
