name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run syntax:upstream
      - run: npm run check
      - run: npm run build

  language-examples:
    name: 入门语言示例
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: 检出言序 1.1.20
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: YanXuLang/yanxu
          ref: v1.1.20
          path: target/yanxu-core
      - name: 构建言序
        run: cargo build --manifest-path target/yanxu-core/Cargo.toml --locked --bin yanxu
      - name: 核对文档与可运行源码
        shell: bash
        run: |
          set -euo pipefail
          core="$GITHUB_WORKSPACE/target/yanxu-core/target/debug/yanxu"
          node - <<'NODE'
          const fs = require('node:fs');
          const pairs = [
            ['content/docs/getting-started/first-program.mdx', 'examples/language/初见.yx'],
            ['content/docs/getting-started/first-project.mdx', 'examples/language/问候项目.yx'],
          ];
          for (const [page, example] of pairs) {
            const block = fs.readFileSync(page, 'utf8').match(/\n```yanxu\n([\s\S]*?)\n```/);
            if (!block || `${block[1]}\n` !== fs.readFileSync(example, 'utf8')) throw new Error(`${page} 与 ${example} 不一致`);
          }
          NODE
          node scripts/check-examples.mjs "$core"
          for file in examples/language/*.yx; do
            "$core" check "$file"
            "$core" fmt "$file" > "$RUNNER_TEMP/格式化.yx"
            cmp "$file" "$RUNNER_TEMP/格式化.yx"
          done
          test "$("$core" examples/language/初见.yx)" = "你好，言序"
          test "$("$core" examples/language/问候项目.yx)" = $'你好，言序\n你好，开发者'

  desktop-examples:
    name: 桌面生态示例（言序 ${{ matrix.yanxu }}）
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        yanxu: ['1.1.9', '1.1.20']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: 安装原生窗口运行依赖
        run: |
          sudo apt-get -o Acquire::Retries=5 update
          sudo apt-get -o Acquire::Retries=5 install -y \
            libfontconfig1 libwayland-client0 libxkbcommon0 libxkbcommon-x11-0 \
            libx11-6 xvfb
      - name: 检出言序 ${{ matrix.yanxu }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: YanXuLang/yanxu
          ref: v${{ matrix.yanxu }}
          path: target/yanxu-core
      - name: 构建言序并锁定言界 1.0
        run: |
          grep -Fx '言界 = { 包 = "yanxu-ui", git = "https://github.com/yanxulang/yanxu-ui.git", 修订 = "v1.0.0", 版 = "^1.0" }' examples/desktop/言序.toml
          cargo build --manifest-path target/yanxu-core/Cargo.toml --locked --bin yanxu
          target/yanxu-core/target/debug/yanxu 包 更新 examples/desktop
      - name: 核对文档源码、格式与静态类型
        shell: bash
        run: |
          set -euo pipefail
          core="$GITHUB_WORKSPACE/target/yanxu-core/target/debug/yanxu"
          awk '/^```yanxu$/{inside=1; next} inside && /^```$/{exit} inside {print}' \
            content/docs/ecosystem/desktop/complete-example.mdx > "$RUNNER_TEMP/完整示例.yx"
          cmp examples/desktop/综合控件展示.yx "$RUNNER_TEMP/完整示例.yx"
          for file in examples/desktop/*.yx; do
            "$core" 格 "$file" > "$RUNNER_TEMP/格式化.yx"
            cmp "$file" "$RUNNER_TEMP/格式化.yx"
            "$core" 查 "$file"
          done
      - name: 构建全部文档示例
        shell: bash
        run: |
          set -euo pipefail
          core="$GITHUB_WORKSPACE/target/yanxu-core/target/debug/yanxu"
          mkdir -p "$RUNNER_TEMP/desktop-build"
          for file in examples/desktop/*.yx; do
            name="$(basename "$file" .yx)"
            "$core" 编 "$file" --release -o "$RUNNER_TEMP/desktop-build/$name.yxb"
          done
          test "$(find "$RUNNER_TEMP/desktop-build" -type f -name '*.yxb' | wc -l)" -eq 3
      - name: 运行自动关闭真实窗口
        run: xvfb-run -a target/yanxu-core/target/debug/yanxu 字节 examples/desktop/自动关闭冒烟.yx
